<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIN | Screenplay</title>
    <link rel="stylesheet" href="../CSS/examples.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">  <!-- fixed -->
</head>
<body>
    <header class="overlay-header">
        <div class="logo-wrapper">
            <a href="/" class="site-title">InfantJS</a>  <!-- fixed -->
            <p class="site-subtitle">For Infants</p>
        </div>
        <nav class="top-nav">
            <a href="/examples/" class="back-link">← Back to Examples</a>
        </nav>
    </header>

    <main>
        <div class="page-buffer"></div>

        <section class="script-reader-container">
            <div class="script-header">
                <h1>Shapes</h1>
                <p class="script-meta">Play with Shapes</p>
                <a href="code_examples/shapes.pdf" download="shapes.pdf" class="download-btn">Download PDF</a>  <!-- fixed -->
            </div>

            <div class="pdf-viewer">
                <canvas id="pdf-canvas"></canvas>
            </div>

            <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
            <script>
                pdfjsLib.GlobalWorkerOptions.workerSrc = 
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                pdfjsLib.getDocument('Scripts/shapes.pdf').promise.then(pdf => {
                    pdf.getPage(1).then(page => {
                        const canvas = document.getElementById('pdf-canvas');
                        const viewport = page.getViewport({ scale: 1.5 });
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        page.render({ canvasContext: canvas.getContext('2d'), viewport });
                    });
                });
            </script>
            </div>
        </section>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Staggered entrance animation
            const cards = document.querySelectorAll('.dev-card');
            cards.forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(24px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 120 + i * 80);
            });

            // Logo click sound
            const infantButton = document.querySelector('.site-title');
            const clickSound = new Audio('/Noise/creaturelaugh.mp3');
            clickSound.playbackRate = 3.0;
            infantButton.addEventListener('click', (event) => {
                event.preventDefault();
                const targetUrl = infantButton.getAttribute('href');
                clickSound.play();
                setTimeout(() => { window.location.href = targetUrl; }, 500);
            });
        });
    </script>
</body>
</html>
