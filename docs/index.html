<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>InfantJS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/index.css">

</head>
<body>

  <main>
      <section class="hero">
          <header class="overlay-header">
              <a href="/" class="site-title">InfantJS</a>
              <nav class="top-nav">
                  <a href="/examples/">Examples</a>
                  <a href="/story/">Story</a>
                  <a href="/about/">About</a>
                  <a href="/github/">Github Repo</a>
              </nav>
          </header>

          <div class="hero-image-container">
              <div class="blurred-bg" style="background-image: url('/logo.png');"></div>            
              <div class="hero-center-text">
                  <h1>InfantJS</h1>
                  <p>For when BabyJS is too advanced</p>
              </div>
          </div>
      </section>
  </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Staggered entrance animation
            const cards = document.querySelectorAll('.dev-card');
            cards.forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(24px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 120 + i * 80);
            });

            // Logo click sound
            const infantButton = document.querySelector('.site-title');
            const clickSound = new Audio('/Noise/creaturelaugh.mp3');
            clickSound.playbackRate = 3.0;
            infantButton.addEventListener('click', (event) => {
                event.preventDefault();
                const targetUrl = infantButton.getAttribute('href');
                clickSound.play();
                setTimeout(() => { window.location.href = targetUrl; }, 500);
            });
        });
    </script>


</body>
</html>
