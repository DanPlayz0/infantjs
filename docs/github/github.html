<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfantJS Github Repo</title>
    <link rel="stylesheet" href="/github/github.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="/theme/theme.css">
    <script src="/theme/theme.js" defer></script>
</head>
<body>
    <header class="overlay-header">
        <div class="logo-wrapper">
            <a href="/" class="site-title">InfantJS</a>
            <p class="site-subtitle">For Infants</p>
        </div>
        <nav class="top-nav">
            <a href="/examples/">Examples</a>
            <a href="/story/">Story</a>
            <a href="/about/">About</a>
            <a href="/github/">Github Repo</a>
        </nav>
    </header>

<main>
    <div class="container">
        <h2 class="contact-title">InfantJS Github Repository</h2>

        <div class="icons-row">
            <div class="contact">
                <a href="https://github.com/DanPlayz0/infantjs">
                    <img src="/github/GitHub_Invertocat_White.png" alt="Github">
                </a>
            </div>
        </div>
    </div>
</main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Staggered entrance animation
            const cards = document.querySelectorAll('.dev-card');
            cards.forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(24px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 120 + i * 80);
            });

            // Logo click sound
            const infantButton = document.querySelector('.site-title');
            const clickSound = new Audio('/Noise/creaturelaugh.mp3');
            clickSound.playbackRate = 3.0;
            infantButton.addEventListener('click', (event) => {
                event.preventDefault();
                const targetUrl = infantButton.getAttribute('href');
                clickSound.play();
                setTimeout(() => { window.location.href = targetUrl; }, 500);
            });
        });
    </script>
</body>
</html>
