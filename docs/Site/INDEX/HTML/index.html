<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>InfantJS</title>
    <link rel="icon" type="image/x-icon" href="\images\favicon.ico">
    <link rel="stylesheet" href="\Site\INDEX\CSS\index.css">

</head>
<body>

<main>
    <section class="hero">
        <header class="overlay-header">
            <a href="\Site\INDEX\HTML\index.html" class="site-title">InfantJS</a>
            <nav class="top-nav">
                <a href="\Site\EXAMPLES\HTML\examples.html">Examples</a>
                <a href="\Site\STORY\HTML\story.html">Story</a>
                <a href="\Site\ABOUT\HTML\about.html">About</a>
                <a href="\Site\GITHUBREPO\HTML\github.html">Github Repo</a>
            </nav>
        </header>

        <div class="hero-image-container">
            <div class="blurred-bg" style="background-image: url('../Images/logo.png');"></div>            
            <div class="hero-center-text">
                <h1>InfantJS</h1>
                <p>For when BabyJS is too advanced</p>
            </div>
        </div>
    </section>
</main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const infantButton = document.querySelector('.site-title');
            const clickSound = new Audio('/Noise/creaturelaugh.mp3');
            clickSound.playbackRate = 3.0;
            infantButton.addEventListener('click', (event) => {
                event.preventDefault(); 
                const targetUrl = infantButton.getAttribute('href');
                clickSound.play();
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1000); 
            });
        });
    </script>


</body>
</html>
