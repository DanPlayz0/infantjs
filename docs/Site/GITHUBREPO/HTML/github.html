<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfantJS Github Repo</title>
    <link rel="stylesheet" href="\Site\GITHUBREPO\CSS\github.css"> 
    <link rel="icon" type="image/x-icon" href="\images\favicon.ico">
    <link rel="stylesheet" href="\theme\theme.css">
    <script src="/theme/theme.js" defer></script>

</head>
<body>
    <header class="overlay-header">
        <div class="logo-wrapper">
            <a href="\Site\INDEX\HTML\index.html" class="site-title">InfantJS</a>
            <p class="site-subtitle">For Infants</p>  
        </div>
        <nav class="top-nav">
            <a href="\Site\EXAMPLES\HTML\examples.html">Examples</a>
            <a href="\Site\STORY\HTML\story.html">Story</a>
            <a href="\Site\ABOUT\HTML\about.html">About</a>
            <a href="\Site\GITHUBREPO\HTML\github.html">Github Repo</a>
        </nav>
    </header>

<main>
    <div class="container">
        <h2 class="contact-title">InfantJS Github Repository</h2>

        <div class="icons-row">
            <div class="contact">
                <a href="https://github.com/DanPlayz0/infantjs">
                    <img src="docs/images/GitHub_Invertocat_White.png" alt="Github">
                </a>
            </div>
        </div>
    </div>
</main>
    <script>
    document.getElementById('contact-link').addEventListener('click', function(e) {
        e.preventDefault(); 
        const email = "info@milesmarti.com";
        const subject = "";
        const body = "";


        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        } else {
            const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.open(gmailUrl, '_blank');
        }
    });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const infantButton = document.querySelector('.site-title');
            const clickSound = new Audio('/Noise/creaturelaugh.mp3');
            clickSound.playbackRate = 3.0;
            infantButton.addEventListener('click', (event) => {
                event.preventDefault(); 
                const targetUrl = infantButton.getAttribute('href');
                clickSound.play();
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500); 
            });
        });
    </script>
</body>
</html>
