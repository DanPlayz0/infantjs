permalink: /about/

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfantJS Story</title>
    <link rel="stylesheet" href="/about/about.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/theme/theme.css">
    <script src="/theme/theme.js" defer></script>

</head>
<body>
    <header class="overlay-header">
        <div class="logo-wrapper">
            <a href="/" class="site-title">InfantJS</a>
            <p class="site-subtitle">For Infants</p>
        </div>
        <nav class="top-nav">
            <a href="/examples/">Examples</a>
            <a href="/story/">Story</a>
            <a href="/about/">About</a>
            <a href="/github/">Github Repo</a>
        </nav>
    </header>

    <main>
        <div class="page-buffer"></div>

        <div class="film-detail-container">
            <div class="poster-column">
                <img src="/logo.png" alt="About Image">
            </div>

            <div class="content-column">
                <div class="movie-info">
                    <h1>Story</h1>
                    <p><i>InfantJS is a simplified JavaScript environment designed for young learners. It provides a gentle introduction to programming concepts with a focus on creativity and exploration.</p></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
          const infantButton = document.querySelector('.site-title');
          const clickSound = new Audio('/Noise/creaturelaugh.mp3');
          clickSound.playbackRate = 3.0;
          infantButton.addEventListener('click', (event) => {
            event.preventDefault(); 
            const targetUrl = infantButton.getAttribute('href');
            clickSound.play();
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500); 
          });
        });
    </script>
</body>
</html>
